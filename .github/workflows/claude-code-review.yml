name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    # Review only code-bearing changes; docs/config churn is CI-checked, not reviewed
    paths:
      - 'src/**'
      - 'ios/**'
      - 'android/**'
      - 'plugin/src/**'
      - 'example/**'
      - 'example-expo/**'
      - 'package.json'
      - '*.podspec'

# One review per PR at a time; a new push cancels the superseded run (cost control)
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip drafts, bot-authored PRs, and PRs opting out via [skip-review]
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.user.type != 'Bot' &&
      !contains(github.event.pull_request.title, '[skip-review]')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post/update the review comment
      issues: read
      id-token: write # required for OAuth token exchange

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment is required for the plugin to post findings to the PR;
          # without it the review is a terminal-only summary in the run log.
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          # One always-visible summary comment, updated in place on each push.
          # Trade-off: sticky mode replaces inline diff comments with the single summary.
          use_sticky_comment: true
          # Post the review report even when there are zero findings — without this,
          # a clean review leaves no visible trace on the PR (only the Actions log).
          display_report: true
          # Sanity-check inline findings through a fast model before posting (fewer false positives)
          classify_inline_comments: true
          include_fix_links: true
          # The plugin posts findings via `gh pr comment` (summary) and the
          # inline-comment MCP tool — BOTH must be explicitly allowed or the
          # posting step is silently permission-denied and the review stays
          # terminal-only (the exact failure seen on PR #13's runs).
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),mcp__github_inline_comment__create_inline_comment,Read,Glob,Grep"
          # Review severity/scope tuning lives in REVIEW.md at the repo root.
          # NOTE: changes to this file only take effect after merging to main —
          # the action refuses to run a pull_request-triggered workflow whose
          # file differs from the default branch (anti-tampering).
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
